# nginx site for morseWeb. Installed by deploy/setup_server.sh to
# /etc/nginx/sites-available/morseweb (with YOUR_DOMAIN substituted).
#
# certbot --nginx adds the TLS server block and the HTTP->HTTPS
# redirect after this file is in place; keep this file HTTP-only.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Matches the app's MAX_CONTENT_LENGTH (16 KB JSON posts).
    client_max_body_size 16k;

    location /static/ {
        alias /opt/morseweb/app/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
