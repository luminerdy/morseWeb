{% extends "base.html" %}
{% block title %}Forgot password{% endblock %}
{% block heading %}Forgot Password{% endblock %}
{% block content %}
    <section class="panel auth-panel">
        <div class="section-heading">
            <h2>Reset by email</h2>
            <span class="panel-meta">Kids: ask your parent to set a new password</span>
        </div>

        <form method="post" action="/forgot">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="email">Account email</label>
            <input id="email" name="email" type="email" required autocomplete="email" autofocus>

            <div class="action-row">
                <button type="submit" class="button primary">Send reset link</button>
                <a class="button secondary" href="/login">Back to login</a>
            </div>
        </form>
    </section>
{% endblock %}
