# Deploy to the EC2 instance via SSM run-command.
#
# Triggers on version tags (v*) or manually with a ref. Requires
# repository secrets (see docs/DEPLOY.md for the IAM/OIDC setup):
#   AWS_DEPLOY_ROLE_ARN  role assumable by this repo via GitHub OIDC
#   AWS_REGION           e.g. us-east-1
#   EC2_INSTANCE_ID      e.g. i-0123456789abcdef0
#
# The role needs ssm:SendCommand on the instance + AWS-RunShellScript,
# and ssm:GetCommandInvocation to read the result. No SSH keys anywhere.

name: deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (tag or branch)"
        default: "main"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send deploy command
        id: send
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "morseWeb deploy $REF" \
            --parameters "commands=[\"bash /opt/morseweb/app/deploy/deploy.sh $REF\"],executionTimeout=[\"600\"]" \
            --query "Command.CommandId" --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for result
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.send.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${{ steps.send.outputs.command_id }}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "StandardOutputContent" --output text
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "${{ steps.send.outputs.command_id }}" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "[StandardOutputContent,StandardErrorContent]" --output text
                exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command" >&2
          exit 1
